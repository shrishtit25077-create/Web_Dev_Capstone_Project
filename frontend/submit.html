<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="icons/logo.png" class="logo-icon" alt="CampusHub logo">
            <span>CampusHub</span>
        </div>
        <div class="menu">
            <a href="index.html" class="menu-item">
                <div class="icon-box"><img src="icons/dashboard.png" alt="Dashboard"></div>
                <span>Dashboard</span>
            </a>
            <a href="assignment.html" class="menu-item active">
                <div class="icon-box"><img src="icons/book.png" alt="Assignments"></div>
                <span>Assignments</span>
            </a>
            <a href="coding.html" class="menu-item">
                <div class="icon-box"><img src="icons/code.png" alt="Coding Lab"></div>
                <span>Coding Lab</span>
            </a>
            <a href="#" class="menu-item">
                <div class="icon-box"><img src="icons/quiz.png" alt="Quiz Center"></div>
                <span>Quiz Center</span>
            </a>
            <a href="#" class="menu-item">
                <div class="icon-box"><img src="icons/chart.png" alt="Performance"></div>
                <span>Performance</span>
            </a>
            <a href="#" class="menu-item">
                <div class="icon-box"><img src="icons/notes.png" alt="Notes"></div>
                <span>Notes</span>
            </a>
            <a href="#" class="menu-item">
                <div class="icon-box"><img src="icons/calendar.png" alt="Calendar"></div>
                <span>Calendar</span>
            </a>
            <a href="#" class="menu-item">
                <div class="icon-box"><img src="icons/user.png" alt="Profile"></div>
                <span>Profile</span>
            </a>
            <a href="admin.html" class="menu-item">
                <div class="icon-box"><img src="icons/settings.png" alt="Admin"></div>
                <span>Admin</span>
            </a>
        </div>
    </div>


    <!-- Main -->
    <div class="main">

        <div class="navbar">
            <div class="search">
                <input type="text" placeholder="Search...">
            </div>
        </div>

        <div class="content">
            <h2 class="page-title">Submit Assignment</h2>

            <div class="form-card">

                <div class="form-group">
                    <label>Assignment Title</label>
                    <input type="text" id="title">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc"></textarea>
                </div>

                <div class="form-group">
                    <label>Upload File</label>
                    <input type="file">
                </div>

           
                <button type="button" class="btn-primary" onclick="submitAssignment()">
                    Submit Assignment
                </button>

            </div>
        </div>

    </div>

    <!-- JS -->
    <script>

    function submitAssignment() {

        var title = document.getElementById("title").value;
        var description = document.getElementById("desc").value;

        fetch("http://127.0.0.1:5001/assignments", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                description: description
            })
        })
        .then(function(res) {
            return res.json();
        })
        .then(function() {
            alert("Assignment Submitted ✅");

            // redirect back to assignment page
            window.location.href = "assignment.html";
        });

    }

    </script>

</body>
</html>
