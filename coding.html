<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">
        <div class="logo">CampusHub</div>

        <div class="menu">
            <div class="menu-item">Dashboard</div>
            <div class="menu-item">Assignments</div>
            <div class="menu-item active">Coding Lab</div>
            <div class="menu-item">Quiz Center</div>
            <div class="menu-item">Performance</div>
            <div class="menu-item">Notes</div>
            <div class="menu-item">Calendar</div>
            <div class="menu-item">Profile</div>
            <div class="menu-item">Admin</div>
        </div>
    </div>

    <!-- Main -->

    <div class="main">

        <div class="navbar">
            <div class="search">
                <input type="text" placeholder="Search problems...">
            </div>
        </div>

        <div class="content">
            <h2 class="page-title">Coding Lab</h2>

            
            <div class="problem-list">

                <div class="problem-card">
                    <h3>Two Sum</h3>
                    <p>Find indices of numbers that add to target</p>
                    <div class="problem-footer">
                        <span class="difficulty easy">Easy</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

                <div class="problem-card">
                    <h3>Palindrome Check</h3>
                    <p>Check if string is palindrome</p>
                    <div class="problem-footer">
                        <span class="difficulty medium">Medium</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

                <div class="problem-card">
                    <h3>Binary Search</h3>
                    <p>Search element in sorted array</p>
                    <div class="problem-footer">
                        <span class="difficulty hard">Hard</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

            </div>
            

        </div>

    </div>

</body>

</html>
