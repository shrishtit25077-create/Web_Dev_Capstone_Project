<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <img src="icons/logo.png" class="logo-icon" alt="CampusHub logo">
            <span>CampusHub</span>
        </div>

        <div class="menu">

            <a href="index.html" class="menu-item">
                <div class="icon-box">
                    <img src="icons/dashboard.png" alt="Dashboard">
                </div>
                <span>Dashboard</span>
            </a>

            <a href="assignment.html" class="menu-item">
                <div class="icon-box">
                    <img src="icons/book.png" alt="Assignments">
                </div>
                <span>Assignments</span>
            </a>

            <a href="coding.html" class="menu-item active">
                <div class="icon-box">
                    <img src="icons/code.png" alt="Coding Lab">
                </div>
                <span>Coding Lab</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/quiz.png" alt="Quiz Center">
                </div>
                <span>Quiz Center</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/chart.png" alt="Performance">
                </div>
                <span>Performance</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/notes.png" alt="Notes">
                </div>
                <span>Notes</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/calendar.png" alt="Calendar">
                </div>
                <span>Calendar</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/user.png" alt="Profile">
                </div>
                <span>Profile</span>
            </a>

            <a href="#" class="menu-item">
                <div class="icon-box">
                    <img src="icons/settings.png" alt="Admin">
                </div>
                <span>Admin</span>
            </a>

        </div>

    </div>

    <!-- Main -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar">
            <div class="search">
                <input type="text" placeholder="Search problems...">
            </div>
        </div>

        <!-- Content -->
        <div class="content">

            <h2 class="page-title">Coding Lab</h2>

            <div class="problem-list">

                <!-- Problem 1 -->
                <div class="problem-card">
                    <h3>Two Sum</h3>
                    <p>Find indices of numbers that add to target</p>

                    <div class="problem-footer">
                        <span class="difficulty easy">Easy</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

                <!-- Problem 2 -->
                <div class="problem-card">
                    <h3>Palindrome Check</h3>
                    <p>Check if string is palindrome</p>

                    <div class="problem-footer">
                        <span class="difficulty medium">Medium</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

                <!-- Problem 3 -->
                <div class="problem-card">
                    <h3>Binary Search</h3>
                    <p>Search element in sorted array</p>

                    <div class="problem-footer">
                        <span class="difficulty hard">Hard</span>
                        <button type="button" class="btn-primary">Solve</button>
                    </div>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
