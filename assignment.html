<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">
        <div class="logo">CampusHub</div>

        <div class="menu">
            <div class="menu-item">Dashboard</div>
            <div class="menu-item active">Assignments</div>
            <div class="menu-item">Coding Lab</div>
            <div class="menu-item">Quiz Center</div>
            <div class="menu-item">Performance</div>
            <div class="menu-item">Notes</div>
            <div class="menu-item">Calendar</div>
            <div class="menu-item">Profile</div>
            <div class="menu-item">Admin</div>
        </div>
    </div>

    <!-- Main -->

    <div class="main">

        <div class="navbar">
            <div class="search">
                <input type="text" placeholder="Search assignments...">
            </div>
        </div>

        <div class="content">
            <h2 class="page-title">Assignments</h2>


            <div class="assignment-grid">

                <div class="assignment-card">
                    <h3>Web Dev Project</h3>
                    <p>Build a responsive dashboard UI</p>
                    <div class="assignment-footer">
                        <span class="status pending">Pending</span>
                        <button type="button" class="btn-primary">Submit</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <h3>Python Basics</h3>
                    <p>Practice loops and functions</p>
                    <div class="assignment-footer">
                        <span class="status completed">Completed</span>
                        <button type="button" class="btn-disabled" disabled>Submitted</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <h3>Flask API</h3>
                    <p>Create GET & POST APIs</p>
                    <div class="assignment-footer">
                        <span class="status pending">Pending</span>
                        <button type="button" class="btn-primary">Submit</button>
                    </div>
                </div>

            </div>


        </div>

    </div>

</body>

</html>
