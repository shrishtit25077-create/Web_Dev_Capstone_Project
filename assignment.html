<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">CampusHub</div>
        <div class="menu">
            <a href="index.html" class="menu-item">Dashboard</a>
            <a href="assignment.html" class="menu-item active">Assignments</a>
            <a href="coding.html" class="menu-item">Coding Lab</a>
            <a href="#" class="menu-item">Quiz Center</a>

            <a href="#" class="menu-item">Profile</a>
            <a href="#" class="menu-item">Admin</a>
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="navbar">
            <div class="search">
                <input type="text" placeholder="Search assignments...">
            </div>
        </div>

        <div class="content">
            <h2 class="page-title">Assignments</h2>

            <div class="assignment-grid">

                <div class="assignment-card">
                    <h3>Web Dev Project</h3>
                    <p>Build a responsive dashboard UI</p>
                    <div class="assignment-footer">
                        <span class="status pending">Pending</span>
                        <button type="button" class="btn-primary" onclick="location.href='submit.html'">Submit</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <h3>Python Basics</h3>
                    <p>Practice loops and functions</p>
                    <div class="assignment-footer">
                        <span class="status completed">Completed</span>
                        <button type="button" class="btn-disabled" disabled>Submitted</button>
                    </div>
                </div>

                <div class="assignment-card">
                    <h3>Flask API</h3>
                    <p>Create GET &amp; POST APIs</p>
                    <div class="assignment-footer">
                        <span class="status pending">Pending</span>
                        <button type="button" class="btn-primary" onclick="location.href='submit.html'">Submit</button>
                    </div>
                </div>

            </div>
        </div>

    </div>
